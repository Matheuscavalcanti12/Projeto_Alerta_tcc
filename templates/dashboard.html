<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body { font-family: Arial; background: #f0f0f0; text-align: center; }
        .box { background: white; padding: 20px; width: 400px; margin: auto; margin-top: 60px; border-radius: 10px; }
        button { padding: 15px; width: 80%; margin-top: 10px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        #start { background: green; color: white; }
        #stop { background: red; color: white; }
        #statusBox { margin-top: 20px; font-weight: bold; }
    </style>

</head>
<body>

<div class="box">
    <h2>Bem-vindo, {{ nome }}!</h2>

    <button id="start">▶ Iniciar Sistema</button>
    <button id="stop">⛔ Parar Sistema</button>

    <p id="statusBox">Status: carregando...</p>

    <a href="/logout">Sair</a>
</div>


<script>
    function atualizarStatus() {
        fetch("/status")
        .then(r => r.json())
        .then(d => {
            document.getElementById("statusBox").innerHTML =
                d.rodando ? "Status: RODANDO 🟢" : "Status: PARADO 🔴";
        });
    }

    setInterval(atualizarStatus, 1500);
    atualizarStatus();

    document.getElementById("start").onclick = function() {
        fetch("/iniciar")
        .then(r => r.json())
        .then(alert);
    };

    document.getElementById("stop").onclick = function() {
        fetch("/parar")
        .then(r => r.json())
        .then(alert);
    };
</script>

</body>
</html>
